<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PizzaTime - лучшая пицца в Киеве</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:900|Roboto:300&display=swap&subset=cyrillic" rel="stylesheet">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/main-header.css">
  <link rel="stylesheet" href="css/intro.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body>
  <header></header>
  <main>
    <header class="main-header">
      <div class="main-header__container container">
        <img class="main-header__logo" src="img/common/logo.svg" width="127" height="21" alt="Логотип PizzaTime">
        <div class="main-header__user-nav">
          <nav class="main-header__nav">
            <ul class="main-header__menu-list">
              <li class="main-header__menu-item">
                <a class="main-header__menu-link" href="#">
                  <span class="main-header__menu-text">пицца</span>
                </a>
              </li>
              <li class="main-header__menu-item">
                <a class="main-header__menu-link" href="#">
                  <span class="main-header__menu-text">о нас</span>
                </a>
              </li>
              <li class="main-header__menu-item">
                <a class="main-header__menu-link" href="#">
                  <span class="main-header__menu-text">контакты</span>
                </a>
              </li>
            </ul>
          </nav>
          <a class="main-header__phone" href="tel:+38099999999">+38 (099) 99-99-99</a>
          <button class="main-header__button-menu" type="button">
            <span class="visually-hidden">Открыть меню</span>
          </button>
        </div>
      </div>
    </header>
    <section class="intro">
      <div class="intro__container container">
        <p class="intro__subtitle">от итальянского повара</p>
        <h1 class="intro__title">Лучшая пицца в Киеве</h1>
        <a class="intro__button button" href="#catalog">Выбрать</a>
      </div>
    </section>
    <section class="catalog">
      <div class="catalog__container container">
        <header class="catalog__header">
          <h2 class="catalog__title">Меню</h2>
          <ul class="catalog__sort-list">
            <li class="catalog__sort-item">
              <button class="catalog__sort-button catalog__sort-button--active" type="button">все</button>
            </li>
            <li class="catalog__sort-item">
              <button class="catalog__sort-button" type="button">грибные</button>
            </li>
            <li class="catalog__sort-item">
              <button class="catalog__sort-button" type="button">мясные</button>
            </li>
            <li class="catalog__sort-item">
              <button class="catalog__sort-button" type="button">сырные</button>
            </li>
          </ul>
        </header>
      </div>
    </section>
  </main>
  <footer></footer>
</body>
</html>
